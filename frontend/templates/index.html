<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RutaSegura GDL</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>RutaSegura GDL</h1>
      <p>Encuentra trayectos con menor exposición al riesgo</p>
    </div>
    <button id="btnReiniciar">Reiniciar</button>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="card">
        <h2>Planear ruta</h2>

        <label for="municipio">Municipio</label>
        <select id="municipio">
          <option value="Guadalajara" selected>Guadalajara</option>
          <option value="Zapopan">Zapopan</option>
          <option value="Tequila">Tequila</option>
          <option value="El Salto">El Salto</option>
          <option value="Acatlán de Juárez">Acatlán de Juárez</option>
        </select>

        <label for="origenTipo">Tipo de origen</label>
        <select id="origenTipo">
          <option value="colonia" selected>Colonia</option>
          <option value="turistico">Zona turística / hotel</option>
        </select>

        <label for="origen">Origen</label>
        <input type="text" id="origen" placeholder="Ej. Centro Guadalajara">

        <label for="origenTuristico">Origen turístico</label>
        <select id="origenTuristico">
          <option value="">Selecciona un punto</option>
        </select>

        <label for="destinoTipo">Tipo de destino</label>
        <select id="destinoTipo">
          <option value="colonia" selected>Colonia</option>
          <option value="turistico">Zona turística / hotel</option>
        </select>

        <label for="destino">Destino</label>
        <input type="text" id="destino" placeholder="Ej. Chapalita">

        <label for="destinoTuristico">Destino turístico</label>
        <select id="destinoTuristico">
          <option value="">Selecciona un punto</option>
        </select>

        <div class="checks">
          <label><input type="checkbox" id="toggleHex" checked> Mostrar malla de riesgo</label>
          <label><input type="checkbox" id="togglePuntos"> Mostrar centros de colonias</label>
          <label><input type="checkbox" id="toggleCamaras" checked> Mostrar cámaras demo</label>
          <label><input type="checkbox" id="toggleTurismo" checked> Mostrar zonas turísticas</label>
        </div>

        <div class="checks">
          <label><input type="radio" name="tipoRuta" value="segura" checked> Ruta más segura</label>
          <label><input type="radio" name="tipoRuta" value="rapida"> Ruta más rápida</label>
        </div>

        <button id="btnCalcular">Calcular ruta</button>
      </section>

      <section class="card">
        <h2>Resumen</h2>
        <div class="summary-item"><span>Riesgo estimado</span><strong id="riesgoRuta">--</strong></div>
        <div class="summary-item"><span>Distancia</span><strong id="distanciaRuta">--</strong></div>
        <div class="summary-item"><span>Tiempo</span><strong id="tiempoRuta">--</strong></div>
        <div class="summary-item"><span>Cámaras cercanas</span><strong id="camarasRuta">--</strong></div>
        <div class="summary-item"><span>Colonias críticas</span><strong id="coloniasCriticas">--</strong></div>
      </section>

      <section class="card">
        <h2>Leyenda</h2>
        <div class="legend-item"><span class="dot bajo"></span> Bajo (0 - 25)</div>
        <div class="legend-item"><span class="dot moderado"></span> Moderado (26 - 50)</div>
        <div class="legend-item"><span class="dot alto"></span> Alto (51 - 75)</div>
        <div class="legend-item"><span class="dot muy-alto"></span> Muy alto (76 - 100)</div>
        <div class="legend-item"><span class="dot sin-dato"></span> Sin dato</div>
        <div class="legend-item"><span class="dot turismo"></span> Zona turística</div>
      </section>
    </aside>

    <section class="map-panel">
      <div id="map"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
